name: ZelEn Full Cryptographic Lifecycle

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  zelen-complete-pipeline:
    name: End-to-End Quantum Encryption
    runs-on: ubuntu-latest

    env:
      ZELEN_PASS: ${{ secrets.ROCHESTON }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm ZelEn passphrase secret is available
        run: |
          if [ -z "$ZELEN_PASS" ]; then
            echo "ERROR: ZELEN_PASS is empty."
            echo "Your GitHub repository secret is named ROCHESTON."
            echo "Make sure the workflow uses:"
            echo "ZELEN_PASS: \${{ secrets.ROCHESTON }}"
            exit 1
          fi

          echo "ZELEN_PASS is available."
          echo "Secret length: ${#ZELEN_PASS}"

      - name: Create Sensitive Artifact
        run: |
          echo "CONFIDENTIAL: Zelfire Platform Source Code" > top-secret.txt
          echo "Generated by ZelEn GitHub Actions lifecycle test." >> top-secret.txt
          echo "This file will be encrypted, signed, verified, decrypted, and integrity checked." >> top-secret.txt

      - name: Pull ZelEn Container
        run: |
          docker pull rocheston/zelen:latest

      - name: Show ZelEn Version
        run: |
          docker run --rm rocheston/zelen:latest --version

      - name: Run ZelEn Doctor Diagnostic
        run: |
          echo "Running ZelEn doctor as diagnostic only."
          echo "In GitHub Actions, /home/zelen/.zelen may not exist because each docker run is fresh."
          echo "Doctor output is useful, but it should not stop this lifecycle workflow."
          docker run --rm rocheston/zelen:latest doctor || true

      - name: Run ZelEn Self-Test
        run: |
          docker run --rm rocheston/zelen:latest self-test

      - name: Generate Quantum-Safe Keys
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest keys generate \
            --subject "ci-pipeline@rocheston.com" \
            --name "GitHub-Actions-Automation" \
            --suite pq5 \
            --out pipeline

      - name: Confirm Generated Key Files Exist
        run: |
          echo "Checking generated key files..."

          if [ ! -f pipeline.zpub ]; then
            echo "ERROR: pipeline.zpub was not created."
            ls -lah
            exit 1
          fi

          if [ ! -f pipeline.zkey ]; then
            echo "ERROR: pipeline.zkey was not created."
            ls -lah
            exit 1
          fi

          echo "Generated public key: pipeline.zpub"
          echo "Generated private key: pipeline.zkey"
          ls -lah pipeline.zpub pipeline.zkey

      - name: Inspect Private Key
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest keys inspect \
            --key pipeline.zkey

      - name: Inspect Public Key
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest keys inspect \
            --key pipeline.zpub

      - name: Encrypt File Artifact
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest encrypt file \
            --recipient pipeline.zpub \
            --input top-secret.txt \
            --out top-secret.zelen

      - name: Confirm Encrypted File Exists
        run: |
          if [ ! -f top-secret.zelen ]; then
            echo "ERROR: top-secret.zelen was not created."
            ls -lah
            exit 1
          fi

          echo "Encrypted file created:"
          ls -lah top-secret.zelen

      - name: Inspect Encrypted File Container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest inspect \
            --input top-secret.zelen

      - name: Sign Encrypted File Container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest sign \
            --key pipeline.zkey \
            --input top-secret.zelen \
            --out top-secret.zelen.sig

      - name: Confirm Signature Exists
        run: |
          if [ ! -f top-secret.zelen.sig ]; then
            echo "ERROR: top-secret.zelen.sig was not created."
            ls -lah
            exit 1
          fi

          echo "Signature file created:"
          ls -lah top-secret.zelen.sig

      - name: Verify ML-DSA Signature
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest verify \
            --key pipeline.zpub \
            --input top-secret.zelen \
            --sig top-secret.zelen.sig

      - name: Decrypt File Artifact
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input top-secret.zelen \
            --out recovered-top-secret.txt

      - name: Verify File Plaintext Integrity
        run: |
          echo "Original file SHA256:"
          sha256sum top-secret.txt

          echo "Recovered file SHA256:"
          sha256sum recovered-top-secret.txt

          diff top-secret.txt recovered-top-secret.txt

          echo "ZelEn file encryption/decryption round-trip completed perfectly."

      - name: Encrypt Text Message
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest encrypt text \
            --recipient pipeline.zpub \
            --text "Hello from ZelEn GitHub Actions. This is a quantum-safe encrypted text message." \
            --out message.zelen

      - name: Inspect Encrypted Text Container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest inspect \
            --input message.zelen

      - name: Decrypt Text Message
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt text \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input message.zelen

      - name: Create ASCII Armored Container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest armor \
            --input top-secret.zelen \
            --out top-secret.zelen.asc

      - name: Convert ASCII Armor Back To Binary
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest dearmor \
            --input top-secret.zelen.asc \
            --out top-secret-restored.zelen

      - name: Decrypt Restored Binary Container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input top-secret-restored.zelen \
            --out recovered-from-armor.txt

      - name: Verify Armor Round Trip
        run: |
          diff top-secret.txt recovered-from-armor.txt
          echo "ZelEn armor/dearmor round-trip completed perfectly."

      - name: Run Tamper Detection Test
        run: |
          cp top-secret.zelen tampered.zelen

          printf 'X' | dd of=tampered.zelen bs=1 seek=20 count=1 conv=notrunc

          set +e

          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input tampered.zelen \
            --out tampered-output.txt

          RESULT=$?

          set -e

          if [ "$RESULT" -eq 0 ]; then
            echo "ERROR: Tampered container decrypted successfully. This should not happen."
            exit 1
          fi

          echo "Tamper detection worked. ZelEn failed closed as expected."

      - name: Show ZelEn CLI Examples
        run: |
          echo ""
          echo "ZelEn CLI examples demonstrated by this workflow:"
          echo ""
          echo "Generate keys:"
          echo './zelen keys generate --subject alice@example.com --name Alice --suite pq5 --out ~/Downloads/alice'
          echo "Creates: alice.zpub and alice.zkey"
          echo ""
          echo "Inspect public key:"
          echo "zelen keys inspect --key alice.zpub"
          echo ""
          echo "Inspect private key:"
          echo "zelen keys inspect --key alice.zkey"
          echo ""
          echo "Encrypt file:"
          echo "zelen encrypt file --recipient alice.zpub --input secret.pdf --out secret.zelen"
          echo ""
          echo "Decrypt file:"
          echo "zelen decrypt file --key alice.zkey --passphrase-env ZELEN_PASS --input secret.zelen --out recovered.pdf"
          echo ""
          echo "Encrypt text:"
          echo 'zelen encrypt text --recipient alice.zpub --text "Hello, quantum world!" --out message.zelen'
          echo ""
          echo "Decrypt text:"
          echo "zelen decrypt text --key alice.zkey --passphrase-env ZELEN_PASS --input message.zelen"
          echo ""
          echo "Sign file:"
          echo "zelen sign --key alice.zkey --input report.pdf --out report.sig"
          echo ""
          echo "Verify signature:"
          echo "zelen verify --key alice.zpub --input report.pdf --sig report.sig"
          echo ""
          echo "Armor:"
          echo "zelen armor --input message.zelen --out message.zelen.asc"
          echo ""
          echo "Dearmor:"
          echo "zelen dearmor --input message.zelen.asc --out message.zelen"

      - name: List Generated ZelEn Artifacts
        run: |
          echo "Generated files:"
          ls -lah

          echo ""
          echo "ZelEn lifecycle artifacts:"
          ls -lah pipeline.zkey pipeline.zpub top-secret.zelen top-secret.zelen.sig message.zelen top-secret.zelen.asc top-secret-restored.zelen || true

      - name: Upload ZelEn Lifecycle Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zelen-cryptographic-lifecycle-artifacts
          path: |
            pipeline.zpub
            top-secret.txt
            top-secret.zelen
            top-secret.zelen.sig
            recovered-top-secret.txt
            message.zelen
            top-secret.zelen.asc
            top-secret-restored.zelen
            recovered-from-armor.txt
          retention-days: 7
