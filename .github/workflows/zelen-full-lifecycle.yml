name: ZelEn Full Cryptographic Lifecycle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  zelen-complete-pipeline:
    name: End-to-End Quantum Encryption
    runs-on: ubuntu-latest

    env:
      # Your GitHub repository secret is currently named ROCHESTON.
      # It is mapped into the container as ZELEN_PASS for ZelEn CLI operations.
      ZELEN_PASS: ${{ secrets.ROCHESTON }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm ZelEn passphrase secret is available
        shell: bash
        run: |
          if [ -z "${ZELEN_PASS}" ]; then
            echo "ERROR: ZELEN_PASS is empty."
            echo "Your repository secret shown in GitHub is named ROCHESTON."
            echo "This workflow expects: ZELEN_PASS: secrets.ROCHESTON"
            echo "Go to Repository Settings > Secrets and variables > Actions and confirm ROCHESTON exists."
            exit 1
          fi

          echo "ZELEN_PASS is available."
          echo "Secret length: ${#ZELEN_PASS}"

      - name: Create Sensitive Artifact
        shell: bash
        run: |
          cat > top-secret.txt <<'TEXT'
          CONFIDENTIAL: Zelfire Platform Source Code
          Generated by ZelEn GitHub Actions lifecycle test.
          This file will be encrypted, signed, verified, decrypted, and integrity checked.
          Built with love by Haja Mo.
          TEXT

          echo "Created plaintext test artifact:"
          ls -lah top-secret.txt

      - name: Pull ZelEn Container
        shell: bash
        run: |
          docker pull rocheston/zelen:latest

      - name: Show ZelEn Version
        shell: bash
        run: |
          docker run --rm rocheston/zelen:latest --version

      - name: Run ZelEn Doctor Diagnostic
        shell: bash
        run: |
          echo "Running ZelEn doctor diagnostic."
          echo "In GitHub Actions, every docker run starts a fresh container."
          echo "Doctor may report missing /home/zelen/.zelen config folders, which is normal for this CI lifecycle test."
          echo "The real cryptographic workflow uses the mounted GitHub workspace at /data."
          docker run --rm rocheston/zelen:latest doctor || true

      - name: Run ZelEn Self-Test
        shell: bash
        run: |
          docker run --rm rocheston/zelen:latest self-test

      - name: Generate Quantum-Safe Keys
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest keys generate \
            --subject "ci-pipeline@rocheston.com" \
            --name "GitHub Actions Automation" \
            --out pipeline \
            --passphrase-env ZELEN_PASS

      - name: Show Generated Key Files
        shell: bash
        run: |
          echo "Generated key files:"
          ls -lah pipeline.zkey pipeline.zpub

      - name: Inspect Private Key
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest keys inspect \
            --key pipeline.zkey

      - name: Inspect Public Key
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest keys inspect \
            --key pipeline.zpub

      - name: Encrypt File Artifact
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest encrypt file \
            --recipient pipeline.zpub \
            --input top-secret.txt \
            --out top-secret.zelen

      - name: Inspect Encrypted File Container
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest inspect \
            --input top-secret.zelen

      - name: Sign Encrypted File Container
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest sign \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input top-secret.zelen \
            --out top-secret.zelen.sig

      - name: Verify ML-DSA Signature
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest verify \
            --key pipeline.zpub \
            --input top-secret.zelen \
            --sig top-secret.zelen.sig

      - name: Decrypt File Artifact
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input top-secret.zelen \
            --out recovered-top-secret.txt

      - name: Verify File Plaintext Integrity
        shell: bash
        run: |
          echo "Original file SHA256:"
          sha256sum top-secret.txt

          echo "Recovered file SHA256:"
          sha256sum recovered-top-secret.txt

          diff top-secret.txt recovered-top-secret.txt
          echo "ZelEn file encryption and decryption round-trip completed perfectly."

      - name: Encrypt Text Message
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest encrypt text \
            --recipient pipeline.zpub \
            --text "Hello from ZelEn GitHub Actions. This is a quantum-safe encrypted text message." \
            --out message.zelen

      - name: Inspect Encrypted Text Container
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest inspect \
            --input message.zelen

      - name: Decrypt Text Message
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt text \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input message.zelen

      - name: Create ASCII Armored Container
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest armor \
            --input top-secret.zelen \
            --out top-secret.zelen.asc

      - name: Convert ASCII Armor Back To Binary
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest dearmor \
            --input top-secret.zelen.asc \
            --out top-secret-restored.zelen

      - name: Decrypt Restored Binary Container
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input top-secret-restored.zelen \
            --out recovered-from-armor.txt

      - name: Verify Armor Round Trip
        shell: bash
        run: |
          diff top-secret.txt recovered-from-armor.txt
          echo "ZelEn armor and dearmor round-trip completed perfectly."

      - name: Run Tamper Detection Test
        shell: bash
        run: |
          cp top-secret.zelen tampered.zelen

          # Flip one byte in the encrypted container. Decryption must fail closed.
          printf 'X' | dd of=tampered.zelen bs=1 seek=20 count=1 conv=notrunc

          set +e
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input tampered.zelen \
            --out tampered-output.txt
          RESULT=$?
          set -e

          if [ "${RESULT}" -eq 0 ]; then
            echo "ERROR: Tampered container decrypted successfully. This should not happen."
            exit 1
          fi

          echo "Tamper detection worked. ZelEn failed closed as expected."

      - name: List Generated ZelEn Artifacts
        shell: bash
        run: |
          echo "Generated files:"
          ls -lah

          echo ""
          echo "ZelEn lifecycle artifacts:"
          ls -lah pipeline.zkey pipeline.zpub top-secret.zelen top-secret.zelen.sig message.zelen top-secret.zelen.asc top-secret-restored.zelen || true

      - name: Upload ZelEn Lifecycle Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zelen-cryptographic-lifecycle-artifacts
          path: |
            pipeline.zpub
            top-secret.txt
            top-secret.zelen
            top-secret.zelen.sig
            recovered-top-secret.txt
            message.zelen
            top-secret.zelen.asc
            top-secret-restored.zelen
            recovered-from-armor.txt
          retention-days: 7
