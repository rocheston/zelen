name: ZelEn Full Cryptographic Lifecycle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  zelen-complete-pipeline:
    name: End-to-End Quantum Encryption (PQ5 + MTE-PQ5)
    runs-on: ubuntu-latest

    env:
      ZELEN_PASS: ${{ secrets.ROCHESTON }}
      ZELEN_TAU_PASS: ${{ secrets.ROCHESTON }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm ZelEn passphrase secret is available
        run: |
          if [ -z "$ZELEN_PASS" ]; then
            echo "ERROR: ZELEN_PASS is empty. Make sure the secret ROCHESTON is set."
            exit 1
          fi
          echo "ZELEN_PASS is available (length: ${#ZELEN_PASS})"

      - name: Create Sensitive Artifact
        run: |
          echo "CONFIDENTIAL: Zelfire Platform Source Code" > top-secret.txt
          echo "Generated by ZelEn GitHub Actions lifecycle test." >> top-secret.txt
          echo "This file will be encrypted, signed, verified, decrypted, and integrity checked." >> top-secret.txt
          echo "MTE-PQ5 round-trip test also included." >> top-secret.txt

      - name: Pull ZelEn Container
        run: docker pull rocheston/zelen:latest

      - name: Show ZelEn Version
        run: docker run --rm rocheston/zelen:latest --version

      - name: Show MTE-PQ5 Documentation
        run: docker run --rm rocheston/zelen:latest mte

      - name: Run ZelEn Doctor Diagnostic
        run: docker run --rm rocheston/zelen:latest doctor || true

      - name: Run ZelEn Self-Test Suite
        run: docker run --rm rocheston/zelen:latest self-test

      # ── PQ5 Standard Suite ─────────────────────────────────────────────────

      - name: "[PQ5] Generate Quantum-Safe Keys"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest keys generate \
            --subject "ci-pipeline@rocheston.com" \
            --name "GitHub-Actions-Automation" \
            --suite pq5 \
            --out pipeline \
            --passphrase-env ZELEN_PASS

      - name: "[PQ5] Confirm Key Files Exist"
        run: |
          [ -f pipeline.zpub ] || { echo "ERROR: pipeline.zpub missing"; ls -lah; exit 1; }
          [ -f pipeline.zkey ] || { echo "ERROR: pipeline.zkey missing"; ls -lah; exit 1; }
          echo "Keys created:"; ls -lah pipeline.zpub pipeline.zkey

      - name: "[PQ5] Inspect Private Key"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest keys inspect pipeline.zkey

      - name: "[PQ5] Inspect Public Key"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest keys inspect pipeline.zpub

      - name: "[PQ5] Encrypt File Artifact"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest encrypt file \
            --recipient pipeline.zpub \
            --input top-secret.txt \
            --out top-secret.zelen

      - name: "[PQ5] Confirm Encrypted File Exists"
        run: |
          [ -f top-secret.zelen ] || { echo "ERROR: top-secret.zelen missing"; ls -lah; exit 1; }
          echo "Encrypted file:"; ls -lah top-secret.zelen

      - name: "[PQ5] Inspect Encrypted Container"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest inspect top-secret.zelen

      - name: "[PQ5] Sign Encrypted Container"
        run: |
          echo -n "$ZELEN_PASS" > /tmp/zelen_pass.txt
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -v /tmp/zelen_pass.txt:/tmp/zelen_pass.txt:ro \
            -w /data \
            rocheston/zelen:latest sign \
            --key pipeline.zkey \
            --passphrase-file /tmp/zelen_pass.txt \
            --input top-secret.zelen \
            --out top-secret.zelen.sig
          rm -f /tmp/zelen_pass.txt

      - name: "[PQ5] Verify ML-DSA Signature"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest verify \
            --pub-key pipeline.zpub \
            --input top-secret.zelen \
            --signature top-secret.zelen.sig

      - name: "[PQ5] Decrypt File Artifact"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input top-secret.zelen \
            --out recovered-top-secret.txt

      - name: "[PQ5] Verify File Plaintext Integrity"
        run: |
          echo "Original:";  sha256sum top-secret.txt
          echo "Recovered:"; sha256sum recovered-top-secret.txt
          diff top-secret.txt recovered-top-secret.txt
          echo "PQ5 file encrypt/decrypt round-trip: PASSED"

      - name: "[PQ5] Encrypt Text Message"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest encrypt text \
            --recipient pipeline.zpub \
            --text "Hello from ZelEn GitHub Actions. This is a quantum-safe encrypted text message." \
            --out message.zelen

      - name: "[PQ5] Decrypt Text Message"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt text \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input message.zelen

      - name: "[PQ5] Armor Container to ASCII"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest armor top-secret.zelen \
            --out top-secret.zelen.asc

      - name: "[PQ5] Dearmor Back to Binary"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest dearmor top-secret.zelen.asc \
            --out top-secret-restored.zelen

      - name: "[PQ5] Decrypt Restored Binary Container"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input top-secret-restored.zelen \
            --out recovered-from-armor.txt

      - name: "[PQ5] Verify Armor Round-Trip"
        run: |
          diff top-secret.txt recovered-from-armor.txt
          echo "PQ5 armor/dearmor round-trip: PASSED"

      - name: "[PQ5] Tamper Detection Test"
        run: |
          cp top-secret.zelen tampered.zelen
          printf 'X' | dd of=tampered.zelen bs=1 seek=20 count=1 conv=notrunc
          set +e
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input tampered.zelen \
            --out tampered-output.txt
          RESULT=$?
          set -e
          [ "$RESULT" -ne 0 ] || { echo "ERROR: Tampered container should not decrypt."; exit 1; }
          echo "PQ5 tamper detection: PASSED (failed closed as expected)"

      # ── MTE-PQ5 Suite ──────────────────────────────────────────────────────

      - name: "[MTE-PQ5] Generate MTE Key Bundle"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest keys generate \
            --subject "mte-ci@rocheston.com" \
            --name "MTE-GitHub-Actions" \
            --suite mte-pq5 \
            --out mte-pipeline \
            --passphrase-env ZELEN_PASS

      - name: "[MTE-PQ5] Confirm MTE Key Bundle Exists"
        run: |
          [ -f mte-pipeline.zkey ]  || { echo "ERROR: mte-pipeline.zkey missing"; ls -lah; exit 1; }
          [ -f mte-pipeline.zpub ]  || { echo "ERROR: mte-pipeline.zpub missing"; ls -lah; exit 1; }
          [ -f mte-pipeline.ztau ]  || { echo "ERROR: mte-pipeline.ztau missing"; ls -lah; exit 1; }
          echo "MTE key bundle created:"; ls -lah mte-pipeline.zkey mte-pipeline.zpub mte-pipeline.ztau

      - name: "[MTE-PQ5] Inspect MTE Keys"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest keys inspect mte-pipeline.zpub
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest tau inspect mte-pipeline.ztau

      - name: "[MTE-PQ5] Encrypt File with MTE Governed Layer"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_TAU_PASS \
            rocheston/zelen:latest encrypt file \
            --recipient mte-pipeline.zpub \
            --suite mte-pq5 \
            --tau mte-pipeline.ztau \
            --tau-passphrase-env ZELEN_TAU_PASS \
            --input top-secret.txt \
            --out top-secret-mte.zelen

      - name: "[MTE-PQ5] Confirm MTE Encrypted File Exists"
        run: |
          [ -f top-secret-mte.zelen ] || { echo "ERROR: top-secret-mte.zelen missing"; ls -lah; exit 1; }
          echo "MTE-PQ5 encrypted file:"; ls -lah top-secret-mte.zelen

      - name: "[MTE-PQ5] Inspect MTE Container (shows MTE envelope metadata)"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest inspect top-secret-mte.zelen

      - name: "[MTE-PQ5] Decrypt File with Correct τ Datum"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            -e ZELEN_TAU_PASS \
            rocheston/zelen:latest decrypt file \
            --key mte-pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --tau mte-pipeline.ztau \
            --tau-passphrase-env ZELEN_TAU_PASS \
            --input top-secret-mte.zelen \
            --out recovered-mte.txt

      - name: "[MTE-PQ5] Verify MTE Round-Trip Integrity"
        run: |
          echo "Original:";  sha256sum top-secret.txt
          echo "Recovered:"; sha256sum recovered-mte.txt
          diff top-secret.txt recovered-mte.txt
          echo "MTE-PQ5 file encrypt/decrypt round-trip: PASSED"

      - name: "[MTE-PQ5] Encrypt Text Message with MTE Layer"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_TAU_PASS \
            rocheston/zelen:latest encrypt text \
            --recipient mte-pipeline.zpub \
            --suite mte-pq5 \
            --tau mte-pipeline.ztau \
            --tau-passphrase-env ZELEN_TAU_PASS \
            --text "MTE-PQ5 text message: morphological topos layer active." \
            --out message-mte.zelen

      - name: "[MTE-PQ5] Decrypt MTE Text Message"
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            -e ZELEN_TAU_PASS \
            rocheston/zelen:latest decrypt text \
            --key mte-pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --tau mte-pipeline.ztau \
            --tau-passphrase-env ZELEN_TAU_PASS \
            --input message-mte.zelen

      - name: "[MTE-PQ5] Wrong τ Datum Rejection Test"
        run: |
          # Generate a second, unrelated tau for the wrong-tau test
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest keys generate \
            --subject "wrong-tau-test@rocheston.com" \
            --suite mte-pq5 \
            --out wrong-tau \
            --passphrase-env ZELEN_PASS
          # Attempting decryption with wrong tau MUST fail
          set +e
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            -e ZELEN_TAU_PASS \
            rocheston/zelen:latest decrypt file \
            --key mte-pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --tau wrong-tau.ztau \
            --tau-passphrase-env ZELEN_TAU_PASS \
            --input top-secret-mte.zelen \
            --out wrong-tau-output.txt
          RESULT=$?
          set -e
          [ "$RESULT" -ne 0 ] || { echo "ERROR: Wrong tau should have been rejected."; exit 1; }
          echo "MTE-PQ5 wrong-tau rejection: PASSED (failed closed as expected)"

      - name: "[MTE-PQ5] Tamper Detection Test"
        run: |
          cp top-secret-mte.zelen tampered-mte.zelen
          printf 'X' | dd of=tampered-mte.zelen bs=1 seek=20 count=1 conv=notrunc
          set +e
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            -e ZELEN_TAU_PASS \
            rocheston/zelen:latest decrypt file \
            --key mte-pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --tau mte-pipeline.ztau \
            --tau-passphrase-env ZELEN_TAU_PASS \
            --input tampered-mte.zelen \
            --out tampered-mte-output.txt
          RESULT=$?
          set -e
          [ "$RESULT" -ne 0 ] || { echo "ERROR: Tampered MTE container should not decrypt."; exit 1; }
          echo "MTE-PQ5 tamper detection: PASSED (failed closed as expected)"

      # ── Summary ────────────────────────────────────────────────────────────

      - name: List All Generated Artifacts
        run: |
          echo "=== PQ5 Artifacts ==="
          ls -lah pipeline.zkey pipeline.zpub \
            top-secret.zelen top-secret.zelen.sig \
            message.zelen top-secret.zelen.asc \
            top-secret-restored.zelen \
            recovered-top-secret.txt recovered-from-armor.txt 2>/dev/null || true
          echo ""
          echo "=== MTE-PQ5 Artifacts ==="
          ls -lah mte-pipeline.zkey mte-pipeline.zpub mte-pipeline.ztau \
            top-secret-mte.zelen message-mte.zelen \
            recovered-mte.txt 2>/dev/null || true

      - name: Upload ZelEn Lifecycle Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zelen-cryptographic-lifecycle-artifacts
          path: |
            pipeline.zpub
            top-secret.txt
            top-secret.zelen
            top-secret.zelen.sig
            recovered-top-secret.txt
            message.zelen
            top-secret.zelen.asc
            top-secret-restored.zelen
            recovered-from-armor.txt
            mte-pipeline.zpub
            top-secret-mte.zelen
            message-mte.zelen
            recovered-mte.txt
          retention-days: 7
