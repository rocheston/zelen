name: ZelEn Full Cryptographic Lifecycle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  zelen-complete-pipeline:
    name: End-to-End Quantum Encryption
    runs-on: ubuntu-latest

    env:
      ZELEN_PASS: ${{ secrets.ROCHESTON }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm ZelEn passphrase secret is available
        run: |
          if [ -z "$ZELEN_PASS" ]; then
            echo "ERROR: ZELEN_PASS is empty. Make sure the secret ROCHESTON is set."
            exit 1
          fi
          echo "ZELEN_PASS is available (length: ${#ZELEN_PASS})"

      - name: Create Sensitive Artifact
        run: |
          echo "CONFIDENTIAL: Zelfire Platform Source Code" > top-secret.txt
          echo "Generated by ZelEn GitHub Actions lifecycle test." >> top-secret.txt
          echo "This file will be encrypted, signed, verified, decrypted, and integrity checked." >> top-secret.txt

      - name: Pull ZelEn Container
        run: docker pull rocheston/zelen:latest

      - name: Show ZelEn Version
        run: docker run --rm rocheston/zelen:latest --version

      - name: Run ZelEn Doctor Diagnostic
        run: docker run --rm rocheston/zelen:latest doctor || true

      - name: Run ZelEn Self-Test
        run: docker run --rm rocheston/zelen:latest self-test

      - name: Generate Quantum-Safe Keys
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest keys generate \
            --subject "ci-pipeline@rocheston.com" \
            --name "GitHub-Actions-Automation" \
            --suite pq5 \
            --out pipeline \
            --passphrase-env ZELEN_PASS

      - name: Confirm Generated Key Files Exist
        run: |
          [ -f pipeline.zpub ] || { echo "ERROR: pipeline.zpub missing"; ls -lah; exit 1; }
          [ -f pipeline.zkey ] || { echo "ERROR: pipeline.zkey missing"; ls -lah; exit 1; }
          echo "Keys created:"
          ls -lah pipeline.zpub pipeline.zkey

      - name: Inspect Private Key
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest keys inspect pipeline.zkey

      - name: Inspect Public Key
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest keys inspect pipeline.zpub

      - name: Encrypt File Artifact
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest encrypt file \
            --recipient pipeline.zpub \
            --input top-secret.txt \
            --out top-secret.zelen

      - name: Confirm Encrypted File Exists
        run: |
          [ -f top-secret.zelen ] || { echo "ERROR: top-secret.zelen missing"; ls -lah; exit 1; }
          echo "Encrypted file:"; ls -lah top-secret.zelen

      - name: Inspect Encrypted File Container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest inspect top-secret.zelen

      - name: Sign Encrypted File Container
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest sign \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input top-secret.zelen \
            --out top-secret.zelen.sig

      - name: Confirm Signature Exists
        run: |
          [ -f top-secret.zelen.sig ] || { echo "ERROR: signature missing"; ls -lah; exit 1; }
          echo "Signature file:"; ls -lah top-secret.zelen.sig

      - name: Verify ML-DSA Signature
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest verify \
            --pub-key pipeline.zpub \
            --input top-secret.zelen \
            --signature top-secret.zelen.sig

      - name: Decrypt File Artifact
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input top-secret.zelen \
            --out recovered-top-secret.txt

      - name: Verify File Plaintext Integrity
        run: |
          echo "Original:"; sha256sum top-secret.txt
          echo "Recovered:"; sha256sum recovered-top-secret.txt
          diff top-secret.txt recovered-top-secret.txt
          echo "File encryption/decryption round-trip: PASSED"

      - name: Encrypt Text Message
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest encrypt text \
            --recipient pipeline.zpub \
            --text "Hello from ZelEn GitHub Actions. This is a quantum-safe encrypted text message." \
            --out message.zelen

      - name: Inspect Encrypted Text Container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest inspect message.zelen

      - name: Decrypt Text Message
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt text \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input message.zelen

      - name: Create ASCII Armored Container
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest armor top-secret.zelen \
            --out top-secret.zelen.asc

      - name: Convert ASCII Armor Back To Binary
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            rocheston/zelen:latest dearmor top-secret.zelen.asc \
            --out top-secret-restored.zelen

      - name: Decrypt Restored Binary Container
        run: |
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input top-secret-restored.zelen \
            --out recovered-from-armor.txt

      - name: Verify Armor Round Trip
        run: |
          diff top-secret.txt recovered-from-armor.txt
          echo "Armor/dearmor round-trip: PASSED"

      - name: Run Tamper Detection Test
        run: |
          cp top-secret.zelen tampered.zelen
          printf 'X' | dd of=tampered.zelen bs=1 seek=20 count=1 conv=notrunc
          set +e
          docker run --rm --user root \
            -v "${{ github.workspace }}:/data" \
            -w /data \
            -e ZELEN_PASS \
            rocheston/zelen:latest decrypt file \
            --key pipeline.zkey \
            --passphrase-env ZELEN_PASS \
            --input tampered.zelen \
            --out tampered-output.txt
          RESULT=$?
          set -e
          if [ "$RESULT" -eq 0 ]; then
            echo "ERROR: Tampered container should not have decrypted successfully."
            exit 1
          fi
          echo "Tamper detection: PASSED (failed closed as expected)"

      - name: List Generated ZelEn Artifacts
        run: |
          echo "ZelEn lifecycle artifacts:"
          ls -lah pipeline.zkey pipeline.zpub top-secret.zelen top-secret.zelen.sig \
            message.zelen top-secret.zelen.asc top-secret-restored.zelen \
            recovered-top-secret.txt recovered-from-armor.txt || true

      - name: Upload ZelEn Lifecycle Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zelen-cryptographic-lifecycle-artifacts
          path: |
            pipeline.zpub
            top-secret.txt
            top-secret.zelen
            top-secret.zelen.sig
            recovered-top-secret.txt
            message.zelen
            top-secret.zelen.asc
            top-secret-restored.zelen
            recovered-from-armor.txt
          retention-days: 7
